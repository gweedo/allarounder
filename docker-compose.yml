services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: allarounder
      POSTGRES_PASSWORD: allarounder
      POSTGRES_DB: allarounder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allarounder"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      target: deps
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src/backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://allarounder:allarounder@db:5432/allarounder
      APP_ENV: development
      LOG_LEVEL: DEBUG
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      target: deps
    command: npm run dev
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    env_file:
      - .env

volumes:
  postgres_data:
