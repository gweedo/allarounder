name: Staging PostgreSQL stop/start

# Pauses staging PostgreSQL compute nightly to cut idle cost (~$13/mo). Azure
# auto-restarts a stopped Flexible Server after ~7 days, so the stop must be
# re-applied on a recurring schedule rather than issued once.
#
# Never touches production: the job is pinned to the `staging` GitHub
# Environment, so only staging credentials/resource names are ever in scope.

on:
  schedule:
    - cron: "0 22 * * *" # 22:00 UTC nightly
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform on the staging PostgreSQL server"
        required: true
        type: choice
        options:
          - start
          - stop
        default: stop

# Static (not per-ref) group: this guards a singleton external resource, not
# a CI run, so a second trigger should queue behind the first rather than
# cancel it mid-stop/start.
concurrency:
  group: postgres-staging
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  # ── Stop (schedule) or start/stop (manual) staging PostgreSQL ────────────────
  postgres-action:
    name: PostgreSQL ${{ github.event_name == 'schedule' && 'stop' || inputs.action }} (staging)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Azure login (OIDC — staging)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stop or start PostgreSQL
        run: |
          SERVER="${{ vars.POSTGRES_SERVER_NAME }}"
          RG="${{ vars.RESOURCE_GROUP }}"
          ACTION="${{ github.event_name == 'schedule' && 'stop' || inputs.action }}"

          STATE=$(az postgres flexible-server show \
            --name "$SERVER" --resource-group "$RG" \
            --query "state" -o tsv)
          echo "Requested action: $ACTION. Current state: $STATE"

          case "$STATE" in
            Starting|Stopping|Updating|Restarting)
              echo "Server is mid-transition ($STATE) — skipping this run, it'll be caught next time."
              exit 0
              ;;
          esac

          if [[ "$ACTION" == "stop" ]]; then
            case "$STATE" in
              Ready)
                echo "Stopping $SERVER..."
                az postgres flexible-server stop --name "$SERVER" --resource-group "$RG"
                ;;
              Stopped|Disabled)
                # Compute is already paused (Disabled is typically a
                # subscription spending-limit/billing hold) — the cost goal
                # is already met, so this isn't worth failing the run over.
                echo "No action needed — server is already $STATE."
                ;;
              *)
                echo "PostgreSQL is in an unexpected state ($STATE) for a stop request — refusing to act. Check the Azure portal."
                exit 1
                ;;
            esac
          else
            case "$STATE" in
              Stopped)
                echo "Starting $SERVER..."
                az postgres flexible-server start --name "$SERVER" --resource-group "$RG"
                ;;
              Ready)
                echo "No action needed — server is already Ready."
                ;;
              *)
                # e.g. Disabled (subscription spending limit/billing issue),
                # Dropping, Inaccessible — a start call can't fix these.
                echo "PostgreSQL is in an unexpected state ($STATE) for a start request — refusing to act. Check the Azure portal."
                exit 1
                ;;
            esac
          fi
