name: Required checks (path-aware)

# This workflow exists solely to satisfy branch-protection required checks when
# the main path-filtered workflows don't run. It runs on every PR and either
# executes the real suite (if the relevant paths changed) or exits 0 immediately.
#
# Branch protection should require "Test (Vitest)" and "Test (pytest)" from
# THIS workflow, not from frontend.yml / backend.yml directly.

on:
  pull_request:

concurrency:
  group: required-checks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Vitest ────────────────────────────────────────────────────────────────────
  vitest:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend changes
        id: changes
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -q '^src/frontend/\|^\.github/workflows/frontend\.yml' \
            && echo "changed=true" >> "$GITHUB_OUTPUT" \
            || echo "changed=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Run tests with coverage
        if: steps.changes.outputs.changed == 'true'
        run: npm test -- --coverage --coverage.thresholds.lines=80

      - name: No frontend changes — skip
        if: steps.changes.outputs.changed != 'true'
        run: echo "No frontend files changed — Vitest skipped."

  # ── pytest ────────────────────────────────────────────────────────────────────
  pytest:
    name: Test (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: allarounder
          POSTGRES_PASSWORD: allarounder
          POSTGRES_DB: allarounder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect backend changes
        id: changes
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -q '^src/backend/\|^\.github/workflows/backend\.yml' \
            && echo "changed=true" >> "$GITHUB_OUTPUT" \
            || echo "changed=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: steps.changes.outputs.changed == 'true'
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        if: steps.changes.outputs.changed == 'true'
        env:
          DATABASE_URL: postgresql+psycopg://allarounder:allarounder@localhost:5432/allarounder
        run: python -m pytest --cov=app --cov-fail-under=80 --cov-report=xml

      - name: No backend changes — skip
        if: steps.changes.outputs.changed != 'true'
        run: echo "No backend files changed — pytest skipped."
