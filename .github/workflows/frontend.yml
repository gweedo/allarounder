name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  IMAGE_NAME: allarounder-frontend

jobs:
  # ── Lint & type-check ────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type-check (tsc)
        run: npm run typecheck

  # ── Tests with coverage gate ─────────────────────────────────────────────────
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --coverage.thresholds.lines=80

  # ── Security scans (block on high/critical findings) ─────────────────────────
  security:
    name: Security scan
    needs: [lint-and-typecheck, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit (npm audit)
        run: npm audit --audit-level=high

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST (CodeQL)
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          source-root: src/frontend

      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── Build & push image (main branch only) ────────────────────────────────────
  build:
    name: Build & push image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: security
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID_BUILD }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-frontend

  # ── Deploy to staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Azure login (OIDC — staging)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Blue-green deploy (frontend)
        run: |
          APP="${{ vars.FRONTEND_APP_NAME }}"
          RG="${{ vars.RESOURCE_GROUP }}"
          DIGEST="${{ needs.build.outputs.image-digest }}"
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          SHA="${{ github.sha }}"

          # Deploy new revision at 0% traffic
          az containerapp update \
            --name "$APP" --resource-group "$RG" \
            --image "$IMAGE" \
            --revision-suffix "${SHA:0:8}"

          NEW_REVISION="${APP}--${SHA:0:8}"

          # Wait for the new revision to be running
          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              --name "$APP" --resource-group "$RG" \
              --revision "$NEW_REVISION" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "  Revision state ($i/30): $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" ]]; then
              break
            fi
            sleep 10
          done

          # Health check
          FQDN=$(az containerapp revision show \
            --name "$APP" --resource-group "$RG" \
            --revision "$NEW_REVISION" \
            --query "properties.fqdn" -o tsv)

          curl -sf --retry 3 --retry-delay 5 "https://${FQDN}/" \
            || { echo "Health check failed for $FQDN"; exit 1; }

          # Flip 100% traffic
          az containerapp ingress traffic set \
            --name "$APP" --resource-group "$RG" \
            --revision-weight "${NEW_REVISION}=100"

          echo "Deployed ${NEW_REVISION} to staging."

  # ── Playwright E2E against staging ───────────────────────────────────────────
  e2e:
    name: E2E (Playwright — staging)
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.STAGING_URL }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 7

  # ── Promote to production (manual approval required) ─────────────────────────
  deploy-production:
    name: Deploy → production
    needs: [build, e2e]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Azure login (OIDC — production)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Blue-green deploy (frontend — production)
        run: |
          APP="${{ vars.FRONTEND_APP_NAME }}"
          RG="${{ vars.RESOURCE_GROUP }}"
          DIGEST="${{ needs.build.outputs.image-digest }}"
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          SHA="${{ github.sha }}"

          az containerapp update \
            --name "$APP" --resource-group "$RG" \
            --image "$IMAGE" \
            --revision-suffix "${SHA:0:8}"

          NEW_REVISION="${APP}--${SHA:0:8}"

          for i in $(seq 1 30); do
            STATE=$(az containerapp revision show \
              --name "$APP" --resource-group "$RG" \
              --revision "$NEW_REVISION" \
              --query "properties.runningState" -o tsv 2>/dev/null || echo "Unknown")
            echo "  Revision state ($i/30): $STATE"
            if [[ "$STATE" == "Running" || "$STATE" == "RunningAtMaxScale" ]]; then
              break
            fi
            sleep 10
          done

          FQDN=$(az containerapp revision show \
            --name "$APP" --resource-group "$RG" \
            --revision "$NEW_REVISION" \
            --query "properties.fqdn" -o tsv)

          curl -sf --retry 3 --retry-delay 5 "https://${FQDN}/" \
            || { echo "Health check failed"; exit 1; }

          az containerapp ingress traffic set \
            --name "$APP" --resource-group "$RG" \
            --revision-weight "${NEW_REVISION}=100"

          echo "Production deploy complete: ${NEW_REVISION}"
